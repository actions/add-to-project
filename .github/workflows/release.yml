name: Release

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Run in dry-run mode (no tags, releases, or pushes)'
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run semantic-release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            echo "🧪 Running in dry-run mode — no changes will be published"
            npx semantic-release --dry-run
          else
            npx semantic-release
            # Check if semantic-release created a new tag on HEAD
            NEW_TAG=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' || true)
            if [ -n "$NEW_TAG" ]; then
              echo "new_release_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Update major version tag
        if: inputs.dry-run == false && steps.release.outputs.new_release_tag != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_TAG="${{ steps.release.outputs.new_release_tag }}"
          # Extract the major version number (e.g., "v2.1.0" -> "2")
          MAJOR_VERSION=$(echo "$NEW_TAG" | sed 's/^v//' | cut -d. -f1)
          MAJOR_TAG="v${MAJOR_VERSION}"

          echo "New release tag: $NEW_TAG"
          echo "Updating major version tag: $MAJOR_TAG -> $NEW_TAG"

          # Force-update the major version tag to point at the new release
          git tag -f "$MAJOR_TAG" "$NEW_TAG"
          git push -f origin "$MAJOR_TAG"
